<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Swing Trading Copilot v1.0</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0f17; color: #e2e8f0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background-color: #111827; border-right: 1px solid #1f2937; padding: 24px; display: flex; flex-direction: column; }
        .logo-section h1 { font-size: 1.25rem; font-weight: bold; color: #38bdf8; margin-bottom: 4px; }
        .nav-item { display: block; color: #9ca3af; text-decoration: none; padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 4px; }
        .nav-item:hover, .nav-item.active { background-color: #1f2937; color: #ffffff; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid #1f2937; padding-bottom: 16px; margin-bottom: 32px; }
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .card { background-color: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 24px; }
        .card-value { font-size: 1.75rem; font-weight: bold; color: #ffffff; }
        .actions-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
        .action-btn { background-color: #1f2937; border: 1px solid #374151; color: #e5e7eb; padding: 16px; border-radius: 8px; cursor: pointer; text-align: left; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-section"><h1>AI Trading</h1></div>
        <a href="#" class="nav-item active">Dashboard</a>
        <a href="#" class="nav-item">Agent Analysis</a>
    </div>
    <div class="main-content">
        <div class="header"><h2>Command Center</h2></div>
        <div class="metrics-grid">
            <div class="card"><div class="card-title">Portfolio Value</div><div class="card-value">₹0.00</div></div>
            <div class="card"><div class="card-title">Open Positions</div><div class="card-value">0</div></div>
        </div>
        <div class="actions-grid">
            <button class="action-btn">🔍 Analyze Stock</button>
            <button class="action-btn">🎙️ Voice Ask</button>
        </div>
    </div>
    <script>
        // Placeholder for API integration
        console.log("Connect to backend for live data.");
    </script>
</body>
</html>
